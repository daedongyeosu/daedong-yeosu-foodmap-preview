name: Private coordinate build

on:
  push:
    branches:
      - coordinate-build
  workflow_dispatch:

permissions:
  contents: write

jobs:
  geocode:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Verify secret presence without printing it
        shell: bash
        run: |
          if [ -z "$KAKAO_REST_API_KEY" ]; then
            echo "KAKAO_REST_API_KEY is not configured" >&2
            exit 1
          fi
          echo "KAKAO_REST_API_KEY is configured"
      - name: Build coordinate dataset
        run: node scripts/build-store-coordinates.mjs
      - name: Scan output for forbidden secret or credential markers
        shell: bash
        run: |
          if grep -R -E 'KakaoAK|KAKAO_REST_API_KEY|[?&](key|api_key|serviceKey)=' coordinate-output; then
            echo "Forbidden credential marker found" >&2
            exit 1
          fi
          echo "Credential markers: 0"
      - uses: actions/upload-artifact@v4
        with:
          name: store-coordinate-validation
          path: coordinate-output/
          if-no-files-found: error
          retention-days: 7
      - name: Publish review output to coordinate branch only
        shell: bash
        run: |
          mkdir -p data/coordinate-review
          cp coordinate-output/store-coordinates.json data/coordinate-review/store-coordinates.json
          cp coordinate-output/coordinate-validation.json data/coordinate-review/coordinate-validation.json
          cp coordinate-output/SHA256.txt data/coordinate-review/SHA256.txt
          cp coordinate-output/coordinate-unresolved-after-excel.csv data/coordinate-review/coordinate-unresolved-after-excel.csv
          cp coordinate-output/coordinate-existing-conflicts-after-excel.csv data/coordinate-review/coordinate-existing-conflicts-after-excel.csv
          cp coordinate-output/store-coordinates.json data/store-coordinates.json
          cp coordinate-output/coordinate-duplicate-coordinates-after-excel.csv data/coordinate-review/coordinate-duplicate-coordinates-after-excel.csv
          cp coordinate-output/coordinate-shared-addresses-after-excel.csv data/coordinate-review/coordinate-shared-addresses-after-excel.csv
          cp coordinate-output/coordinate-shared-naver-links-after-excel.csv data/coordinate-review/coordinate-shared-naver-links-after-excel.csv
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/coordinate-review
          git diff --cached --quiet && exit 0
          git commit -m "Add coordinate review output"
          git push origin HEAD:coordinate-build
